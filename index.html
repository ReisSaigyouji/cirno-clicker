<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Cirno Clicker</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="img/favicon.ico" type="image/x-icon">
</head>
<body>
    <header><h1>Cirno Clicker!</h1></header>

    <main>
        <div class="image">
            <img src="img/c1.png" alt="Cirno 1" id="cirno">
        </div>
        <div class="clicker">
            <p id="counter">0</p>
            <button id="click">CLICK!</button>
        </div>
        <div class="upgrade">
            <button id="upgrade">UPGRADE!</button>
        </div>
    </main>
</body>
</html>
